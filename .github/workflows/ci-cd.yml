name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # Grant write permission to the GITHUB_TOKEN for creating releases

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build the Electron app
        run: npm run build

      - name: Install Wine32 and Xvfb (for Windows build on Linux)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine32 xvfb

      - name: Build Electron artifacts (Windows)
        run: npx electron-builder build --windows --publish never

      - name: Build Electron artifacts (Linux)
        run: npx electron-builder build --linux --publish never

      - name: Get package.json version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: Automated release from version ${{ steps.get_version.outputs.VERSION }}
          files: |
            release/**/*.exe
            release/**/*.zip
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}